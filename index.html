<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"> 
  <title>For You</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>

body {
  margin: 0;
  background: linear-gradient(270deg, #1a1a00, #3b3000, #4d3f00, #1a1a00);
  background-size: 800% 800%;
  animation: gradientMove 12s ease infinite;
  color: #fff8cc;
  font-family:
  'Poppins',
  'Segoe UI Emoji',
  'Apple Color Emoji',
  sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ================= INTRO ================= */

#intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #1a1a00;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  overflow: hidden;
}

/* Glow */
#intro::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(250,204,21,0.25), transparent 70%);
  filter: blur(80px);
  animation: glowPulse 6s ease-in-out infinite;
}

@keyframes glowPulse {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.3); opacity: 0.8; }
}

/* Sparkles */
.sparkles {
  position: absolute;
  width: 100%;
  height: 100%;
}

.sparkles span {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #fde047;
  border-radius: 50%;
  animation: sparkle 4s infinite;
}

.sparkles span:nth-child(1){ top:20%; left:30%; }
.sparkles span:nth-child(2){ top:60%; left:70%; }
.sparkles span:nth-child(3){ top:40%; left:50%; }
.sparkles span:nth-child(4){ top:80%; left:20%; }
.sparkles span:nth-child(5){ top:30%; left:80%; }

@keyframes sparkle {
  0%{opacity:0; transform:scale(0.5);}
  50%{opacity:1; transform:scale(1.2);}
  100%{opacity:0;}
}

/* Falling Text */
.fall-text {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  color: #facc15;
  transform: translateY(-400px);
  animation: dropBounce 3s ease forwards;
}

@keyframes dropBounce {
  40% { transform: translateY(40px); }
  60% { transform: translateY(-20px); }
  75% { transform: translateY(10px); }
  90% { transform: translateY(-5px); }
  100% { transform: translateY(0); }
}

/* Images */
.image-row {
  display: flex;
  gap: 15px;
  margin-top: 30px;
}

.intro-img {
  width: 90px;
  height: 120px;
  border-radius: 10px;
  opacity: 0;
  transform: translateY(40px);
}

.left-img { animation: imgReveal 1s forwards 1.5s; }
.center-img { animation: imgReveal 1s forwards 1.8s; }
.right-img { animation: imgReveal 1s forwards 2.1s; }

@keyframes imgReveal {
  to { opacity: 1; transform: translateY(0); }
}

/* Name + Sunflowers */
.name-wrapper {
  position: relative;
  margin-top: 20px;
}

.name {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  letter-spacing: 5px;
  opacity: 0;
  animation: revealName 1.5s forwards 3s;
}

@keyframes revealName {
  to { opacity: 1; }
}

.sunflower {
  position: absolute;
  top: 70%;
  left: 50%;
  width: 120px;
  height: 120px;
  background: url('sunflower.png') no-repeat center/contain;

  opacity: 0;
  transform: translate(-50%, -50%) scale(0.8);
}
@keyframes flowerFade {
  from {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.8);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
}

.left-sunflower {
  animation: flowerFade 1s ease forwards 1.5s,
             flowerLeft 3s ease forwards 2.5s;
}

.right-sunflower {
  animation: flowerFade 1s ease forwards 1.5s,
             flowerRight 3s ease forwards 2.5s;
}

@keyframes flowerLeft {
  from {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  to {
    transform: translate(-250%, -50%) scale(1);
    opacity: 0;
  }
}

@keyframes flowerRight {
  from {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }
  to {
    transform: translate(150%, -50%) scale(1);
    opacity: 0;
  }
}
/* Petals */
.petals span {
  position: absolute;
  width: 50px;
  height: 50px;
  border-radius: 60% 40%;
  opacity: 0;
}

/* LEFT SIDE */
.petals span:nth-child(1){ background:#ff4d6d; left:-100px; top:10%; animation:petalLeft 6s forwards 1s;}
.petals span:nth-child(2){ background:#ffafcc; left:-120px; top:30%; animation:petalLeft 6s forwards 1.3s;}
.petals span:nth-child(3){ background:#cdb4db; left:-110px; top:50%; animation:petalLeft 6s forwards 1.6s;}
.petals span:nth-child(4){ background:#ffc8dd; left:-130px; top:70%; animation:petalLeft 6s forwards 1.9s;}
.petals span:nth-child(5){ background:#ff8fab; left:-115px; top:85%; animation:petalLeft 6s forwards 2.2s;}
.petals span:nth-child(6){ background:#ffb3c1; left:-105px; top:95%; animation:petalLeft 6s forwards 2.5s;}

/* RIGHT SIDE */
.petals span:nth-child(7){ background:#a2d2ff; right:-100px; top:15%; animation:petalRight 6s forwards 1s;}
.petals span:nth-child(8){ background:#bde0fe; right:-120px; top:35%; animation:petalRight 6s forwards 1.3s;}
.petals span:nth-child(9){ background:#cdb4db; right:-110px; top:55%; animation:petalRight 6s forwards 1.6s;}
.petals span:nth-child(10){ background:#ffc8dd; right:-130px; top:75%; animation:petalRight 6s forwards 1.9s;}
.petals span:nth-child(11){ background:#ffafcc; right:-115px; top:88%; animation:petalRight 6s forwards 2.2s;}
.petals span:nth-child(12){ background:#ff4d6d; right:-105px; top:98%; animation:petalRight 6s forwards 2.5s;}

@keyframes petalLeft {
  0% { transform: translateX(0) rotate(0); opacity:0; }
  30% { opacity:0.8; }
  100% { transform: translateX(220px) rotate(360deg); opacity:0.6; }
}

@keyframes petalRight {
  0% { transform: translateX(0) rotate(0); opacity:0; }
  30% { opacity:0.8; }
  100% { transform: translateX(-220px) rotate(-360deg); opacity:0.6; }

}

/* ================= MAIN ================= */

.container {
  text-align: center;
  width: 80%;
  max-width: 500px;
  position: relative;
  z-index: 1;
}

.title {
  font-size: 22px;
  margin-bottom: 40px;
}

.card {
  border: 1px solid #facc15;
  padding: 25px;
  border-radius: 15px;
  min-height: 140px;
  background: rgba(250,204,21,0.15);


}
.photo-area {
  position: relative;
  width: 100%;
  height: 0;
}

.side-photo {
  position: absolute;
  width: 110px;
  height: 140px;
  object-fit: cover;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.2);
  opacity: 0;
  transition: all 0.8s ease;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* positions */

.left-photo {
  left: -130px;
  top: 20px;
  transform: rotate(-8deg);
}

.top-photo {
  left: 50%;
  top: -240px;
  transform: translateX(-50%) rotate(3deg);
}

.right-photo {
  right: -130px;
  top: 30px;
  transform: rotate(8deg);
}

/* visible */

.side-photo.show {
  opacity: 1;
}

/* mobile */

@media (max-width: 900px) {

  .side-photo {
    width: 80px;
    height: 100px;
  }

  .left-photo {
    left: -30px;
    top: -70px;
  }

  .right-photo {
    right: -30px;
    top: -70px;
  }

  .top-photo {
    top: -120px;
  }
}

.meta {
  margin-top: 10px;
  font-size: 12px;
  text-align: right;
}

.counter {
  margin-top: 20px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #facc15;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #facc15;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px #facc15;
}


  </style>
</head>

<body>

<!-- INTRO -->
<div id="intro">

  <div class="sparkles">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="petals">
  <span></span><span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span><span></span>
</div>

  <div class="fall-text">Happy 18th</div>

  <div class="image-row">
    <img src="img1.jpg" class="intro-img left-img">
    <img src="img2.jpg" class="intro-img center-img">
    <img src="img3.jpg" class="intro-img right-img">
  </div>

  <div class="name-wrapper">
    <div class="sunflower left-sunflower"></div>
    <div class="sunflower right-sunflower"></div>
    <div class="name">Aanchal</div>
  </div>

</div>

<!-- MAIN -->
<div class="container" id="mainContent" style="display:none;">
  <div id="question" class="title">Why Aanchal is amazing?</div>
  <div class="photo-area">
  <img id="photo1" class="side-photo left-photo">
  <img id="photo2" class="side-photo top-photo">
  <img id="photo3" class="side-photo right-photo">
</div>
  <div id="card" class="card"></div>
  <div id="meta" class="meta"></div>
  <div id="counter" class="counter"></div>

  <button onclick="nextMessage()">Next</button>
  <button onclick="openGallery()">View Gallery</button>
  <button id="restartBtn" onclick="restart()" style="display:none;">Restart</button>
</div>
<script src="responses.js"></script>

<script>

let index = 0;
let stage = 0;

function restoreCurrentCard() {

  const current = responses[index];

  const card = document.getElementById("card");
  const meta = document.getElementById("meta");
  const question = document.getElementById("question");
  const counter = document.getElementById("counter");

  const photo1 = document.getElementById("photo1");
  const photo2 = document.getElementById("photo2");
  const photo3 = document.getElementById("photo3");

  const photos = current.photos || [];

if (photos[0]) {
  photo1.src = photos[0];
  photo1.style.display = "block";
  photo1.classList.add("show");
} else {
  photo1.style.display = "none";
}

if (photos[1]) {
  photo2.src = photos[1];
  photo2.style.display = "block";
  photo2.classList.add("show");
} else {
  photo2.style.display = "none";
}

if (photos[2]) {
  photo3.src = photos[2];
  photo3.style.display = "block";
  photo3.classList.add("show");
} else {
  photo3.style.display = "none";
}

  if (stage === 0) {
    question.innerHTML = "Why Aanchal is amazing?";
    card.innerHTML = current.reason;
  }

  else if (stage === 1) {
    question.innerHTML = "Your favourite memory with her";
    card.innerHTML = current.memory;
  }

  else {
    question.innerHTML = "One song that reminds you of her";
    card.innerHTML = current.song;
  }

  meta.innerHTML = "- " + current.name;
  counter.innerHTML = `${index + 1}/${responses.length}`;
}

function nextMessage() {

  const card = document.getElementById("card");
  const meta = document.getElementById("meta");
  const question = document.getElementById("question");
  const counter = document.getElementById("counter");

  const photo1 = document.getElementById("photo1");
  const photo2 = document.getElementById("photo2");
  const photo3 = document.getElementById("photo3");

  if (index >= responses.length) {

    question.innerHTML = "You made it.";
    card.innerHTML = "You were always amazing. This just proves it.";

    meta.innerHTML = "";
    counter.innerHTML = "";

    document.getElementById("restartBtn").style.display = "inline-block";

    return;
  }

  const current = responses[index];

  const photos = current.photos || [];

  photo1.classList.remove("show");
  photo2.classList.remove("show");
  photo3.classList.remove("show");

  setTimeout(() => {

    if (photos[0]) {
      photo1.src = photos[0];
      photo1.style.display = "block";
      photo1.classList.add("show");
    } else {
      photo1.style.display = "none";
    }

    if (photos[1]) {
      photo2.src = photos[1];
      photo2.style.display = "block";
      photo2.classList.add("show");
    } else {
      photo2.style.display = "none";
    }

    if (photos[2]) {
      photo3.src = photos[2];
      photo3.style.display = "block";
      photo3.classList.add("show");
    } else {
      photo3.style.display = "none";
    }

  }, 200);

  if (stage === 0) {

    question.innerHTML = "Why Aanchal is amazing?";
    card.innerHTML = current.reason || "";

    stage = 1;

  } else if (stage === 1) {

    question.innerHTML = "Your favourite memory with her";
    card.innerHTML = current.memory || "";

    stage = 2;

  } else {

    question.innerHTML = "One song that reminds you of her";
    card.innerHTML = current.song || "";

    stage = 0;
    index++;
  }

  meta.innerHTML = "- " + (current.name || "");

  counter.innerHTML = `${Math.min(index + 1, responses.length)}/${responses.length}`;
}
function restart() {

  localStorage.removeItem("savedIndex");
  localStorage.removeItem("savedStage");

  index = 0;
  stage = 0;

  document.getElementById("restartBtn").style.display = "none";

  nextMessage();
}

function openGallery() {

  localStorage.setItem("savedIndex", index);
  localStorage.setItem("savedStage", stage);
  sessionStorage.setItem("fromGallery", "true");
  window.location.href = "gallery.html";
}

window.onload = () => {

  const savedIndex = localStorage.getItem("savedIndex");
  const savedStage = localStorage.getItem("savedStage");

  if (
  savedIndex !== null &&
  savedStage !== null &&
  sessionStorage.getItem("fromGallery") === "true"
) {

    index = parseInt(savedIndex);
    stage = parseInt(savedStage);

    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";

    restoreCurrentCard();
	sessionStorage.removeItem("fromGallery");
  }

  else {
    console.log(responses);
    setTimeout(() => {

      const intro = document.getElementById("intro");
      const main = document.getElementById("mainContent");

      intro.style.opacity = "0";
      intro.style.transition = "1s";

      setTimeout(() => {

        intro.style.display = "none";
        main.style.display = "block";

        nextMessage();

      }, 1000);

    }, 6500);
  }
};

</script>

</body>
</html>
